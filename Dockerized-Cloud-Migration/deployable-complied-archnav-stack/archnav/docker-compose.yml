name: archnav

services:
  mysql:
    image: mysql:8.4
    container_name: archnav-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: archemy
    command:
      - --mysql-native-password=ON
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --restrict-fk-on-non-standard-key=OFF
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpw"]
      interval: 5s
      timeout: 5s
      retries: 20

  apacheds:
    # Preloaded with Apache Fortress schemas + seed data — published by the
    # Fortress project itself. Replaces both the bare ApacheDS install and the
    # `mvn install -Dload.file=./ldap/setup/refreshLDAPData.xml` seed step.
    image: apachedirectory/apacheds-for-apache-fortress-tests:latest
    container_name: archnav-apacheds
    restart: unless-stopped
    ports:
      - "10389:10389"
    volumes:
      - apacheds-data:/opt/apacheds-2.0.0.AM26-SNAPSHOT/instances/default/partitions

  glassfish:
    build: ./glassfish
    container_name: archnav-glassfish
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      fortress-init:
        condition: service_completed_successfully
    ports:
      - "9999:9999"
      - "4848:4848"
    volumes:
      - ../App/WebLogic Deployment Archives-091217:/archives:ro

  tomcat-fortress:
    build: ./tomcat-fortress
    container_name: archnav-tomcat-fortress
    restart: unless-stopped
    depends_on:
      fortress-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  # Seeds ApacheDS with Fortress RBAC scaffolding (refreshLDAPData,
  # DelegatedAdminManagerLoad) and the fortress-web demo users
  # (test/test1/test2/test3 — all password "password"). Runs to completion
  # on every `docker compose up`; the Fortress Ant loads are wrapped in
  # `|| echo ...` so re-runs over an already-seeded directory are no-ops.
  # tomcat-fortress and glassfish wait on it so they only ever boot
  # against a fully-populated Config node.
  fortress-init:
    build: ./fortress-init
    container_name: archnav-fortress-init
    depends_on:
      - apacheds
    restart: "no"

volumes:
  mysql-data:
  apacheds-data:
